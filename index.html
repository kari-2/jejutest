<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>수눌음 우영팟 · 시니어 스마트팜</title>
<style>
  /* ===========================================================
     수눌음 우영팟 — 시니어 스마트팜 프로토타입
     Primary #7FA66A / Secondary #B88A5A / Background #F7F3D8
     =========================================================== */
  :root{
    --primary:#7FA66A; --primary-d:#5E8A4C; --primary-l:#D6E4C6;
    --secondary:#B88A5A; --secondary-l:#EBD9C2;
    --bg:#F7F3D8; --ink:#3B4A32; --sub:#7d8a70;
    --glass:rgba(255,255,255,.30);
    --glass-b:rgba(255,255,255,.62);
    --shadow:0 12px 34px rgba(59,74,50,.20);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    color:var(--ink); background:#d9d4b6;
    display:block;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea{font-family:inherit;}

  /* ---------- 앱 컨테이너 (모바일 세로 프레임, 최대 430px) ---------- */
  .app-container{
    position:relative;
    width:100%; max-width:430px;
    height:100vh; height:100dvh;
    margin:0 auto; overflow:hidden;
    background:var(--bg); box-shadow:0 0 60px rgba(59,74,50,.28);
    display:flex; flex-direction:column;
  }

  /* ---------- 화면 컨테이너 ---------- */
  #screens{ position:relative; flex:1; overflow:hidden; }
  /* .screen 은 기본 숨김, .active 만 표시 */
  .screen{
    position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding-bottom:96px;   /* 하단 네비게이션에 콘텐츠가 가리지 않도록 */
    display:none;
    animation:screenIn .32s cubic-bezier(.22,1,.36,1);
  }
  .screen.active{ display:block; }
  @keyframes screenIn{ from{opacity:0;transform:translateX(14px);} to{opacity:1;transform:translateX(0);} }
  .screen::-webkit-scrollbar{ width:0; }

  /* 밝은 세부화면 배경 */
  .screen.light{ background:linear-gradient(180deg,#FBF8E6,#F2EDCF); }

  /* ===========================================================
     공통 컴포넌트
     =========================================================== */
  .header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
    background:rgba(247,243,216,.82);
    -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(184,138,90,.18);
  }
  .header h1{ font-size:19px; font-weight:800; letter-spacing:-.4px; }
  .header .sub{ font-size:12px; color:var(--sub); font-weight:600; }

  /* 비눗방울 유리 버튼 (원형) */
  .bubble{
    position:relative; flex:none;
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
    background:
      radial-gradient(circle at 32% 26%, rgba(255,255,255,.95), rgba(255,255,255,.15) 44%, transparent 62%),
      radial-gradient(circle at 72% 80%, rgba(127,166,106,.45), rgba(127,166,106,.08) 55%),
      rgba(255,255,255,.24);
    -webkit-backdrop-filter:blur(10px) saturate(1.4); backdrop-filter:blur(10px) saturate(1.4);
    border:1.5px solid rgba(255,255,255,.7);
    box-shadow:0 8px 20px rgba(59,74,50,.22), inset 0 4px 10px rgba(255,255,255,.7), inset 0 -6px 12px rgba(127,166,106,.25);
    transition:transform .18s ease;
  }
  .bubble::before{ content:''; position:absolute; top:8px; left:11px; width:12px; height:7px; border-radius:50%; background:rgba(255,255,255,.9); transform:rotate(-25deg); }
  .bubble:active{ transform:scale(.9); }

  .card{
    background:var(--glass-b);
    -webkit-backdrop-filter:blur(16px) saturate(1.25); backdrop-filter:blur(16px) saturate(1.25);
    border:1px solid rgba(255,255,255,.66);
    border-radius:22px; box-shadow:var(--shadow);
    padding:15px;
  }
  .card-title{ font-size:14.5px; font-weight:800; display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .card-title .tag{ font-size:11px; font-weight:700; color:#fff; background:var(--primary); padding:3px 9px; border-radius:999px; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 20px; border-radius:18px; font-size:16px; font-weight:800; letter-spacing:-.3px;
    background:linear-gradient(135deg,var(--primary),var(--primary-d)); color:#fff;
    box-shadow:0 10px 22px rgba(127,166,106,.4), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .16s ease, box-shadow .16s ease; width:100%;
  }
  .btn:active{ transform:scale(.97); }
  .btn.sec{ background:linear-gradient(135deg,var(--secondary),#9c7148); box-shadow:0 10px 22px rgba(184,138,90,.4); }
  .btn.ghost{ background:rgba(255,255,255,.6); color:var(--primary-d); border:1.5px solid var(--primary); box-shadow:none; }

  .ai-badge{ font-size:10px; font-weight:800; color:#fff; background:linear-gradient(135deg,#7FA66A,#B88A5A); padding:2px 8px; border-radius:999px; letter-spacing:.5px; }
  .grade{ font-size:13px; font-weight:900; width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; flex:none; }
  .grade.A{background:#5E8A4C;} .grade.B{background:#7FA66A;} .grade.C{background:#D4A03C;} .grade.D{background:#C06A4A;}

  .thumb{ width:100%; aspect-ratio:1/1; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:46px; }

  /* ===========================================================
     하단 내비게이션 (유리)
     =========================================================== */
  .bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px; z-index:40;
    display:flex; justify-content:space-around; align-items:center;
    padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
    background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:blur(20px) saturate(1.4); backdrop-filter:blur(20px) saturate(1.4);
    border-top:1px solid rgba(255,255,255,.7);
    box-shadow:0 -8px 24px rgba(59,74,50,.14);
  }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; padding:5px 0; color:#9aa39a; font-size:10.5px; font-weight:700; transition:.2s; }
  .tab .i{ font-size:21px; line-height:1; transition:transform .2s; filter:grayscale(.4) opacity(.8); }
  .tab.active{ color:var(--primary-d); }
  .tab.active .i{ filter:none; }
  .tab.active .i{ transform:translateY(-3px) scale(1.12); filter:drop-shadow(0 3px 4px rgba(127,166,106,.5)); }

  /* ===========================================================
     날씨 홈 히어로 (배경 + 화분 + 애니메이션)
     =========================================================== */
  .hero{ position:relative; height:44vh; min-height:320px; overflow:hidden; }
  @media(min-width:460px){ .hero{ height:352px; } }
  .bg-layer{ position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity .8s ease; }
  .bg-layer.active{ opacity:1; }
  .vignette{ position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(to bottom, rgba(0,0,0,.06) 0%, transparent 20%, transparent 55%, rgba(247,243,216,.85) 100%); }

  .fx{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .sun-glow{ position:absolute; top:-150px; left:50%; width:420px; height:420px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,244,190,.85), rgba(255,225,140,.32) 42%, transparent 70%);
    filter:blur(6px); opacity:0; transition:opacity .8s; transform:translateX(-50%); animation:sunPulse 6s ease-in-out infinite; }
  @keyframes sunPulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.08);}}
  .motes{ position:absolute; inset:0; opacity:0; transition:opacity .8s; }
  .mote{ position:absolute; bottom:-20px; width:9px; height:9px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,250,210,.95), rgba(255,240,170,0)); animation:floatUp linear infinite; }
  @keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:0;}15%{opacity:.9;}100%{transform:translateY(-60vh) translateX(24px) scale(1);opacity:0;}}
  .cloud-tint{ position:absolute; inset:0; opacity:0; transition:opacity .8s; mix-blend-mode:multiply;
    background:linear-gradient(180deg, rgba(150,168,180,.28), rgba(120,138,150,.14)); }
  .cloud-band{ position:absolute; inset:0; opacity:0; transition:opacity .8s; filter:blur(8px);
    background:radial-gradient(60% 40% at 20% 25%, rgba(255,255,255,.55), transparent 60%),
              radial-gradient(70% 45% at 75% 20%, rgba(255,255,255,.45), transparent 60%);
    animation:cloudDrift 26s linear infinite alternate; }
  @keyframes cloudDrift{0%{transform:translateX(-6%);}100%{transform:translateX(6%);}}
  .rain{ position:absolute; inset:0; opacity:0; transition:opacity .8s; }
  .drop-rain{ position:absolute; top:-15%; width:2px; height:52px; border-radius:2px;
    background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(214,231,240,.75)); animation:rainFall linear infinite; }
  @keyframes rainFall{0%{transform:translateY(-15vh);opacity:0;}10%{opacity:.7;}100%{transform:translateY(70vh);opacity:.2;}}

  .hero-top{ position:absolute; top:0; left:0; right:0; z-index:6; padding:calc(env(safe-area-inset-top) + 16px) 16px 0;
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .greet{ font-size:17px; font-weight:800; text-shadow:0 1px 6px rgba(255,255,255,.6); }
  .greet small{ display:block; font-size:12px; font-weight:600; color:#5a6a4e; margin-top:2px; }
  .weather-chip{ display:inline-flex; align-items:center; gap:7px; padding:8px 13px; border-radius:999px;
    background:var(--glass); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.55); box-shadow:0 6px 18px rgba(59,74,50,.16); font-size:13px; font-weight:700; }
  .hint{ position:absolute; z-index:6; top:calc(env(safe-area-inset-top) + 64px); left:16px; right:16px;
    font-size:12px; font-weight:600; line-height:1.5; color:#5a6a4e; text-align:center;
    background:rgba(247,243,216,.7); padding:7px 12px; border-radius:14px;
    opacity:0; transform:translateY(-4px); transition:.4s; }
  .hint.show{ opacity:1; transform:translateY(0); }

  .stage{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .pot-wrap{ position:relative; margin-top:14px; width:52%; display:flex; justify-content:center; animation:idleFloat 3s ease-in-out infinite; }
  @keyframes idleFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .pot-img{ width:100%; height:auto; display:block; filter:drop-shadow(0 14px 10px rgba(59,74,50,.28)); }
  .pot-wrap.watered .pot-img{ animation:potBounce .7s ease; }
  @keyframes potBounce{0%{transform:scale(1);}35%{transform:scale(1.09);}100%{transform:scale(1);}}
  .pot-shadow{ position:absolute; bottom:-2%; left:50%; transform:translateX(-50%); width:56%; height:22px; border-radius:50%;
    background:radial-gradient(50% 50% at 50% 50%, rgba(59,74,50,.3), transparent 70%); filter:blur(3px); }
  .leaf{ position:absolute; font-size:24px; opacity:.9; transform-origin:bottom center; filter:drop-shadow(0 2px 3px rgba(0,0,0,.15)); }
  .leaf.l1{ top:4%; left:2%; animation:sway 4.2s ease-in-out infinite; }
  .leaf.l2{ top:12%; right:0%; animation:sway 3.4s ease-in-out infinite reverse; }
  .leaf.l3{ bottom:24%; left:-2%; animation:sway 5s ease-in-out infinite; }
  @keyframes sway{0%,100%{transform:rotate(-8deg) translateY(0);}50%{transform:rotate(9deg) translateY(-4px);}}
  .water-fx{ position:absolute; top:-6%; left:0; right:0; height:60%; }
  .wdrop{ position:absolute; top:0; width:11px; height:15px;
    background:radial-gradient(circle at 35% 30%, #fff, #9fd0e6 60%, #6fb3d6); border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    box-shadow:0 0 6px rgba(120,190,225,.7); opacity:0; }
  @keyframes dropFall{0%{transform:translateY(0) scale(.6);opacity:0;}20%{opacity:1;}100%{transform:translateY(110px) scale(1);opacity:0;}}

  .water-btn{ position:absolute; z-index:12; left:50%; bottom:18px; transform:translateX(-50%);
    width:96px; height:96px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    color:var(--ink); font-weight:800;
    background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.9), rgba(255,255,255,.15) 42%, transparent 60%),
              radial-gradient(circle at 70% 78%, rgba(127,166,106,.5), rgba(127,166,106,.1) 55%), rgba(255,255,255,.22);
    -webkit-backdrop-filter:blur(10px) saturate(1.4); backdrop-filter:blur(10px) saturate(1.4);
    border:1.5px solid rgba(255,255,255,.65);
    box-shadow:0 14px 34px rgba(59,74,50,.3), inset 0 6px 14px rgba(255,255,255,.75), inset 0 -10px 18px rgba(127,166,106,.35);
    animation:bubble 5s ease-in-out infinite; }
  @keyframes bubble{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-5px);}}
  .water-btn:active{ transform:translate(-50%,0) scale(.93); }
  .water-btn::before{ content:''; position:absolute; top:14px; left:20px; width:20px; height:12px; border-radius:50%; background:rgba(255,255,255,.85); filter:blur(1px); transform:rotate(-25deg); }
  .water-btn .drop-ico{ font-size:27px; } .water-btn .lbl{ font-size:13px; }

  .toast{ position:fixed; z-index:99; left:50%; bottom:120px; transform:translate(-50%,14px);
    padding:12px 20px; border-radius:18px; background:rgba(94,138,76,.94); color:#fff; font-size:14px; font-weight:700; white-space:nowrap;
    box-shadow:0 12px 30px rgba(59,74,50,.4); opacity:0; pointer-events:none; transition:.45s cubic-bezier(.34,1.4,.6,1); }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  /* ---------- 홈 대시보드 ---------- */
  .dash{ padding:14px 14px 0; display:flex; flex-direction:column; gap:11px; margin-top:-22px; position:relative; z-index:10; }
  .status-card{ display:flex; flex-direction:column; gap:12px; }
  .status-head{ display:flex; align-items:center; justify-content:space-between; }
  .plant-name{ font-size:17px; font-weight:800; } .plant-name small{ font-size:12px; color:var(--sub); margin-left:6px; }
  .mood{ font-size:12px; font-weight:700; color:#fff; background:var(--primary); padding:5px 11px; border-radius:999px; }
  .gauge-row{ display:flex; align-items:center; gap:10px; }
  .gauge-label{ font-size:12.5px; font-weight:700; color:var(--secondary); white-space:nowrap; }
  .gauge{ flex:1; height:14px; border-radius:999px; background:rgba(184,138,90,.2); overflow:hidden; box-shadow:inset 0 1px 3px rgba(0,0,0,.12); }
  .gauge-fill{ height:100%; width:46%; border-radius:999px; background:linear-gradient(90deg,#8fd3e6,#6fb3d6 60%,#5aa0c8);
    box-shadow:0 0 8px rgba(120,190,225,.6); transition:width .7s cubic-bezier(.34,1.3,.5,1); }
  .gauge-pct{ font-size:13px; font-weight:800; width:38px; text-align:right; }

  .coin-row{ display:flex; gap:12px; }
  .coin-box{ flex:1; text-align:center; padding:14px 8px; border-radius:20px; }
  .coin-box.bat{ background:linear-gradient(135deg, rgba(184,138,90,.22), rgba(184,138,90,.08)); border:1px solid rgba(184,138,90,.3); }
  .coin-box.tam{ background:linear-gradient(135deg, rgba(127,166,106,.22), rgba(127,166,106,.08)); border:1px solid rgba(127,166,106,.3); }
  .coin-box .v{ font-size:22px; font-weight:900; } .coin-box .l{ font-size:11.5px; font-weight:700; color:var(--sub); margin-top:2px; }

  .mission-item{ display:flex; align-items:center; gap:11px; padding:11px 0; border-bottom:1px dashed rgba(184,138,90,.25); }
  .mission-item:last-child{ border-bottom:none; }
  .m-check{ width:26px; height:26px; border-radius:9px; border:2px solid var(--primary); flex:none; display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; transition:.2s; }
  .m-check.done{ background:var(--primary); }
  .mission-item .t{ font-size:14.5px; font-weight:600; flex:1; } .mission-item.done .t{ color:var(--sub); text-decoration:line-through; }

  .ai-msg{ display:flex; gap:11px; align-items:flex-start; }
  .ai-ava{ width:40px; height:40px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:22px;
    background:linear-gradient(135deg,var(--primary-l),#fff); box-shadow:inset 0 0 0 2px rgba(127,166,106,.4); }
  .ai-msg .body{ font-size:14px; line-height:1.55; font-weight:600; }

  .shortcut-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .sc{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 4px; border-radius:20px;
    background:var(--glass-b); border:1px solid rgba(255,255,255,.6); box-shadow:0 6px 16px rgba(59,74,50,.12); transition:transform .16s; }
  .sc:active{ transform:scale(.94); }
  .sc .i{ font-size:26px; } .sc .l{ font-size:11px; font-weight:700; }

  .rank-mini{ display:flex; align-items:center; gap:12px; }
  .rank-badge{ width:52px; height:52px; border-radius:16px; flex:none; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#D4A03C,#B8862A); color:#fff; box-shadow:0 8px 18px rgba(212,160,60,.4); }
  .rank-badge .n{ font-size:20px; font-weight:900; line-height:1; } .rank-badge .u{ font-size:9px; font-weight:700; }

  /* 출석 달력 */
  .cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal .dow{ font-size:10px; font-weight:800; color:var(--sub); text-align:center; padding-bottom:2px; }
  .cal .cell{ aspect-ratio:1/1; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
    background:rgba(184,138,90,.1); color:var(--ink); }
  .cal .cell.empty{ background:none; } .cal .cell.done{ background:var(--primary); color:#fff; box-shadow:0 4px 10px rgba(127,166,106,.4); }
  .cal .cell.today{ outline:2.5px solid var(--secondary); outline-offset:-2px; }
  .streak{ display:flex; gap:10px; margin-bottom:12px; }
  .streak .box{ flex:1; text-align:center; background:rgba(127,166,106,.12); border-radius:16px; padding:10px; }
  .streak .box .v{ font-size:20px; font-weight:900; color:var(--primary-d); } .streak .box .l{ font-size:11px; color:var(--sub); font-weight:700; }

  /* 리스트/카드 그리드 */
  .list{ padding:14px 16px; display:flex; flex-direction:column; gap:12px; }
  .grid2{ padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* 검색/필터 */
  .searchbar{ display:flex; gap:10px; padding:12px 16px 4px; }
  .searchbar input{ flex:1; padding:12px 16px; border-radius:16px; border:1.5px solid rgba(184,138,90,.3); background:rgba(255,255,255,.7); font-size:15px; }
  .filters{ display:flex; gap:8px; padding:8px 16px; overflow-x:auto; }
  .filters::-webkit-scrollbar{height:0;}
  .chip{ flex:none; padding:8px 15px; border-radius:999px; font-size:13px; font-weight:700; background:rgba(255,255,255,.65); border:1.5px solid rgba(184,138,90,.28); color:var(--sub); }
  .chip.on{ background:var(--primary); color:#fff; border-color:var(--primary); box-shadow:0 6px 14px rgba(127,166,106,.35); }

  /* 마켓 카드 */
  .mk{ display:flex; gap:13px; align-items:center; }
  .mk .th{ width:76px; height:76px; border-radius:18px; flex:none; display:flex; align-items:center; justify-content:center; font-size:36px; }
  .mk .info{ flex:1; min-width:0; }
  .mk .title{ font-size:15px; font-weight:700; line-height:1.35; margin-bottom:5px; }
  .mk .meta{ font-size:11.5px; color:var(--sub); font-weight:600; }
  .mk .price{ font-size:16px; font-weight:900; color:var(--secondary); margin-top:4px; }
  .mk .price .free{ color:var(--primary-d); }
  .stbadge{ font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:999px; display:inline-block; }
  .stbadge.sell{ background:rgba(127,166,106,.2); color:var(--primary-d); }
  .stbadge.rsv{ background:rgba(212,160,60,.2); color:#9c7010; }
  .stbadge.done{ background:rgba(120,120,120,.18); color:#666; }

  /* 소셜 */
  .post .p-head{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .p-ava{ width:42px; height:42px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .p-head .nm{ font-size:15px; font-weight:800; } .p-head .mt{ font-size:11px; color:var(--sub); font-weight:600; }
  .p-photo{ width:100%; aspect-ratio:4/3; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:64px; margin:10px 0; }

function render(id, params={}){
  const fn = ROUTES[id];
  if(!fn){ return; }
  const html = fn(params);
  // 세부화면은 light 배경
  const light = !TABS.includes(id) || id!=='home';
  const el = document.createElement('div');
  el.className = 'screen' + (id!=='home' ? ' light':'');
  el.dataset.screen = id;
  el.innerHTML = html;
  // 이전 화면 제거
  screens.innerHTML='';
  screens.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('active'));
  // 탭 활성화
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===currentTab(id)));
  // 스크립트 훅
  if(AFTER[id]) AFTER[id](el, params);
  el.scrollTop=0;
}
function currentTab(id){
  const map={ plantDetail:'mypot', addPlant:'mypot', monitor:'mypot', deviceManage:'mypot',

function renderCalendar(){
  const cal=$('#cal'); if(!cal) return;
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth();
  const first=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate();
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const key=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done=store.attend.includes(key), today=d===now.getDate();
    html+=`<div class="cell ${done?'done':''} ${today?'today':''}">${done?'🌱':d}</div>`;
  }
  cal.innerHTML=html;
  // streak & month count
  $('#stMonth').textContent=store.attend.filter(k=>k.startsWith(`${y}-${String(mo+1).padStart(2,'0')}`)).length;
  let streak=0; const cur=new Date();
  for(;;){ const k=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
    if(store.attend.includes(k)){ streak++; cur.setDate(cur.getDate()-1);} else break; }
  $('#stStreak').textContent=streak;
}

/* ---------- 날씨 ---------- */
function initWeather(){
  const layers={sunny:$('#bg-sunny'),cloudy:$('#bg-cloudy'),rainy:$('#bg-rainy')};
  const fx={sg:$('#sunGlow'),mo:$('#motes'),ct:$('#cloudTint'),cb:$('#cloudBand'),rn:$('#rain')};
  const META={sunny:{i:'☀️',t:'맑음 · 햇살 좋은 날'},cloudy:{i:'☁️',t:'흐림 · 차분한 날'},rainy:{i:'🌧️',t:'비 · 촉촉한 날'}};
  // 입자/빗줄기 생성
  if(fx.mo && !fx.mo.dataset.built){ fx.mo.dataset.built='1';
    for(let i=0;i<14;i++){ const m=document.createElement('div'); m.className='mote'; m.style.left=Math.random()*100+'%';
      const du=7+Math.random()*7; m.style.animationDuration=du+'s'; m.style.animationDelay=(-Math.random()*du)+'s'; fx.mo.appendChild(m);} }
  if(fx.rn && !fx.rn.dataset.built){ fx.rn.dataset.built='1';
    for(let i=0;i<55;i++){ const d=document.createElement('div'); d.className='drop-rain'; d.style.left=Math.random()*100+'%';
      const du=.6+Math.random()*.5; d.style.animationDuration=du+'s'; d.style.animationDelay=(-Math.random()*du)+'s'; d.style.opacity=.3+Math.random()*.5; fx.rn.appendChild(d);} }
  function set(kind){
    store.weather=kind;
    Object.keys(layers).forEach(k=>layers[k].classList.toggle('active',k===kind));
    fx.sg.style.opacity=fx.mo.style.opacity=kind==='sunny'?'1':'0';
    fx.ct.style.opacity=fx.cb.style.opacity=kind==='cloudy'?'1':'0';
    fx.rn.style.opacity=kind==='rainy'?'1':'0';
    $('#wIco').textContent=META[kind].i; $('#wText').textContent=META[kind].t;
  }
  const classify=m=>{ m=(m||'').toLowerCase(); if(/rain|drizzle|thunder/.test(m))return'rainy'; if(/cloud|overcast|mist|fog|haze/.test(m))return'cloudy'; return'sunny'; };
  set('sunny');
  if(!navigator.geolocation){ $('#hint').classList.add('show'); return; }
  navigator.geolocation.getCurrentPosition(async pos=>{
    $('#hint').classList.remove('show');
    const {latitude:lat,longitude:lon}=pos.coords;
    if(WEATHER_API_KEY && WEATHER_API_KEY!=="YOUR_API_KEY_HERE"){
      try{ const r=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}`);
        const d=await r.json(); set(classify(d.weather&&d.weather[0]&&d.weather[0].main)); return; }catch(e){}
    }
    const h=new Date().getHours(); const demo=h>=6&&h<11?'sunny':h>=11&&h<17?'cloudy':'rainy';
    set(demo); $('#wText').textContent=META[demo].t+' (데모)';
  }, ()=>{ set('sunny'); $('#hint').classList.add('show'); }, {timeout:8000});
}

/* =============================================================
   3D 텃밭 (Three.js)
   ============================================================= */
let three={ renderer:null, scene:null, camera:null, wrap:null,
            outside:null, inside:null, cropOutside:null, cropInside:null,
            view:'inside', t:0, raf:null, ready:false };
function init3D(){
  const wrap=document.getElementById('glwrap'); const canvas=document.getElementById('gl');
  if(typeof THREE==='undefined'){ document.getElementById('glFallback').style.display='flex'; return; }
  if(three.raf) cancelAnimationFrame(three.raf);          // 재진입 시 이전 루프 정리
  const view = three.view || 'inside';                    // 이전에 고른 뷰 유지
  const W=wrap.clientWidth, H=wrap.clientHeight;
  // 화면이 아직 display:none(레이아웃 0) 이면 크기가 잡힐 때까지 대기
  if(!W || !H){ three.raf=requestAnimationFrame(init3D); return; }
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(W,H);
  const scene=new THREE.Scene(); scene.fog=new THREE.Fog(0xdff0f5,18,48);
  const camera=new THREE.PerspectiveCamera(45,W/H,0.1,120);

  scene.add(new THREE.AmbientLight(0xffffff,0.72));
  const sun=new THREE.DirectionalLight(0xfff2c4,0.9); sun.position.set(6,12,6); scene.add(sun);

  // 공용 하늘 반구 (온실 유리 너머로도 보임)
  const sky=new THREE.Mesh(new THREE.SphereGeometry(52,16,16), new THREE.MeshBasicMaterial({color:0xbfe3ef,side:THREE.BackSide}));
  scene.add(sky);

  const out=buildOutside(), ins=buildInside();
  scene.add(out.group); scene.add(ins.group);

  three={ renderer, scene, camera, wrap,
          outside:out.group, inside:ins.group,
          cropOutside:out.crop, cropInside:ins.crop,
          view, t:0, raf:null, ready:true };

  update3DGrowth();
  set3DView(view);

  (function loop(){
    // 뷰포트 크기가 바뀌면(회전·표시 전환) 렌더러 동기화
    const cw=wrap.clientWidth, ch=wrap.clientHeight;
    if(cw && ch && (cw!==renderer.domElement.width/renderer.getPixelRatio() || ch!==renderer.domElement.height/renderer.getPixelRatio())){
      renderer.setSize(cw,ch); camera.aspect=cw/ch; camera.updateProjectionMatrix();
    }
    three.t += 0.005; const t=three.t;
    if(three.view==='outside'){
      camera.position.set(Math.sin(t)*11, 5, Math.cos(t)*11); camera.lookAt(0,1.2,0);
    }else{
      // 온실 입구에서 재배 벤치를 바라보며 좌우로 부드럽게 스윙 (벽 안쪽 유지)
      const a=Math.sin(t*0.5)*0.6;
      camera.position.set(Math.sin(a)*5.2, 2.8, Math.cos(a)*5.2); camera.lookAt(0,1.5,-0.3);
    }
    renderer.render(scene,camera); three.raf=requestAnimationFrame(loop);
  })();

  window.addEventListener('resize', ()=>{ if(!three.ready)return; const w=wrap.clientWidth,h=wrap.clientHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); });
}

/* ---------- 야외 씬 (제주풍 텃밭) ---------- */
function buildOutside(){
  const g=new THREE.Group();
  // 잔디 바닥
  const ground=new THREE.Mesh(new THREE.CircleGeometry(20,40), new THREE.MeshLambertMaterial({color:0x9ac46a}));
  ground.rotation.x=-Math.PI/2; g.add(ground);
  // 텃밭 흙 구역
  const soil=new THREE.Mesh(new THREE.BoxGeometry(6,0.4,3.2), new THREE.MeshLambertMaterial({color:0x8a6a4a}));
  soil.position.set(0,0.2,1.5); g.add(soil);
  // 낮은 오름 (뒤쪽 언덕)
  const oreum=(x,z,s,c)=>{ const m=new THREE.Mesh(new THREE.SphereGeometry(s,20,16,0,Math.PI*2,0,Math.PI/2), new THREE.MeshLambertMaterial({color:c})); m.position.set(x,0,z); m.scale.y=0.5; g.add(m); };
  oreum(-7,-9,4,0x8ab86a); oreum(6,-11,5.5,0x7ba85e); oreum(0,-13,4.5,0x93bd74);
  // 제주 토속 집
  const house=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(3,1.8,2.4), new THREE.MeshLambertMaterial({color:0xf2ead6})); body.position.y=0.9; house.add(body);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(2.6,1.3,4), new THREE.MeshLambertMaterial({color:0xc9a15a})); roof.position.y=2.45; roof.rotation.y=Math.PI/4; house.add(roof);
  house.position.set(-5,0,-3.5); house.rotation.y=0.5; g.add(house);
  // 현무암 돌담
  const stoneMat=new THREE.MeshLambertMaterial({color:0x4a4a4a});
  for(let i=0;i<9;i++){ const s=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.55,0.6),stoneMat);
    s.position.set(-4.5+i*0.75, 0.28+(i%2)*0.12, 2.6); s.rotation.y=(i*0.13)%0.4; g.add(s); }
  // 귤나무
  const tree=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.24,1.4,8), new THREE.MeshLambertMaterial({color:0x8a5a3a})); trunk.position.y=0.7; tree.add(trunk);
  const crown=new THREE.Mesh(new THREE.SphereGeometry(1.1,16,14), new THREE.MeshLambertMaterial({color:0x5a9a4a})); crown.position.y=1.9; tree.add(crown);
  for(let i=0;i<7;i++){ const o=new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8), new THREE.MeshLambertMaterial({color:0xf5a623}));
    const a=i*0.9, r=0.6+((i*0.17)%0.5); o.position.set(Math.cos(a)*r,1.6+((i*0.11)%0.7),Math.sin(a)*r); tree.add(o); }
  tree.position.set(5,0,-2); g.add(tree);
  // 작물 (성장에 따라 갱신)
  const crop=new THREE.Group(); crop.position.set(0,0.4,1.5); g.add(crop);
  return {group:g, crop};
}

/* ---------- 내부 씬 (스마트팜 온실 내부) ---------- */
function buildInside(){
  const g=new THREE.Group();
  const HW=6, HD=6, HT=5;   // 방 반너비/반깊이/높이
  const frameMat=new THREE.MeshLambertMaterial({color:0xf4f4ec});
  const glassMat=new THREE.MeshLambertMaterial({color:0xbfe6da, transparent:true, opacity:0.16, side:THREE.DoubleSide});

  // 바닥 (콘크리트 톤)
  const floor=new THREE.Mesh(new THREE.BoxGeometry(HW*2,0.2,HD*2), new THREE.MeshLambertMaterial({color:0xded7c4}));
  floor.position.y=-0.1; g.add(floor);
  // 바닥 격자 라인 느낌 (얇은 판 몇 줄)
  for(let i=-2;i<=2;i++){ const line=new THREE.Mesh(new THREE.BoxGeometry(HW*2,0.02,0.06), new THREE.MeshLambertMaterial({color:0xc9c1ac}));
    line.position.set(0,0.01,i*2.2); g.add(line); }

  // 유리 벽 4면
  const wallBack=new THREE.Mesh(new THREE.PlaneGeometry(HW*2,HT), glassMat); wallBack.position.set(0,HT/2,-HD); g.add(wallBack);
  const wallFront=new THREE.Mesh(new THREE.PlaneGeometry(HW*2,HT), glassMat); wallFront.position.set(0,HT/2,HD); g.add(wallFront);
  const wallL=new THREE.Mesh(new THREE.PlaneGeometry(HD*2,HT), glassMat); wallL.rotation.y=Math.PI/2; wallL.position.set(-HW,HT/2,0); g.add(wallL);
  const wallR=new THREE.Mesh(new THREE.PlaneGeometry(HD*2,HT), glassMat); wallR.rotation.y=Math.PI/2; wallR.position.set(HW,HT/2,0); g.add(wallR);
  // 유리 천장
  const roof=new THREE.Mesh(new THREE.PlaneGeometry(HW*2,HD*2), glassMat); roof.rotation.x=Math.PI/2; roof.position.set(0,HT,0); g.add(roof);

  // 흰색 프레임 (기둥 4개 + 상단 보 4개 + 천장 십자보)
  const post=()=>new THREE.Mesh(new THREE.BoxGeometry(0.16,HT,0.16), frameMat);
  [[-HW,-HD],[HW,-HD],[-HW,HD],[HW,HD]].forEach(([x,z])=>{ const p=post(); p.position.set(x,HT/2,z); g.add(p); });
  const beamX=()=>new THREE.Mesh(new THREE.BoxGeometry(HW*2,0.16,0.16), frameMat);
  const beamZ=()=>new THREE.Mesh(new THREE.BoxGeometry(0.16,0.16,HD*2), frameMat);
  [[-HD],[HD]].forEach(([z])=>{ const b=beamX(); b.position.set(0,HT,z); g.add(b); });
  [[-HW],[HW]].forEach(([x])=>{ const b=beamZ(); b.position.set(x,HT,0); g.add(b); });
  const ridge=beamX(); ridge.position.set(0,HT,0); g.add(ridge);

  // 재배 벤치 (다리 + 상판 + 흙 트로프)
  const woodMat=new THREE.MeshLambertMaterial({color:0xa9865c});
  const benchTop=new THREE.Mesh(new THREE.BoxGeometry(5,0.16,2), woodMat); benchTop.position.set(0,0.9,0); g.add(benchTop);
  [[-2.3,-0.8],[2.3,-0.8],[-2.3,0.8],[2.3,0.8]].forEach(([x,z])=>{ const leg=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.9,0.16), woodMat); leg.position.set(x,0.45,z); g.add(leg); });
  const trough=new THREE.Mesh(new THREE.BoxGeometry(4.6,0.32,1.6), new THREE.MeshLambertMaterial({color:0x6f4c34})); trough.position.set(0,1.14,0); g.add(trough);

  // LED 재배등 (빛나는 바 + 포인트 라이트)
  const ledMat=new THREE.MeshBasicMaterial({color:0xffe6b8});
  [-1,1].forEach(zx=>{
    const bar=new THREE.Mesh(new THREE.BoxGeometry(4.4,0.12,0.28), ledMat); bar.position.set(0,3.3,zx*0.9); g.add(bar);
    // 바를 천장에 매다는 줄
    [-1.8,1.8].forEach(x=>{ const wire=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,1.7,4), frameMat); wire.position.set(x,4.15,zx*0.9); g.add(wire); });
    const pl=new THREE.PointLight(0xffdca8,0.75,14); pl.position.set(0,3.15,zx*0.9); g.add(pl);
  });

  // 뒷벽 선반 + 화분들
  const shelf=new THREE.Mesh(new THREE.BoxGeometry(8,0.14,0.8), woodMat); shelf.position.set(0,2.3,-HD+0.5); g.add(shelf);
  const miniPot=(x,y,z,col)=>{ const grp=new THREE.Group();
    const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.15,0.3,10), new THREE.MeshLambertMaterial({color:0xc26a48})); pot.position.y=0.15; grp.add(pot);
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.24,8,8), new THREE.MeshLambertMaterial({color:col})); leaf.position.y=0.46; leaf.scale.y=0.8; grp.add(leaf);
    grp.position.set(x,y,z); return grp; };
  [-3,-1.5,0,1.5,3].forEach((x,i)=>{ g.add(miniPot(x,2.37,-HD+0.5,[0x6aa85a,0x5a9a4a,0x8ab86a,0x4f8a3a,0x79b06a][i])); });
  // 바닥 화분 몇 개
  g.add(miniPot(-4.6,0,-2, 0x5a9a4a)); g.add(miniPot(4.6,0,-2.6, 0x6aa85a)); g.add(miniPot(4.4,0,2.4, 0x79b06a));

  // 작물 (벤치 흙 위, 성장에 따라 갱신)
  const crop=new THREE.Group(); crop.position.set(0,1.3,0); g.add(crop);
  return {group:g, crop};
}

/* ---------- 뷰 전환 ---------- */
function set3DView(v){
  three.view=v;
  if(three.outside) three.outside.visible=(v==='outside');
  if(three.inside)  three.inside.visible=(v==='inside');
  const box=document.getElementById('viewToggle');
  if(box) box.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.v===v));
}

/* ---------- 작물 성장 (양쪽 씬 동시 갱신) ---------- */
function buildCrop(g){
  if(!g) return;
  while(g.children.length) g.remove(g.children[0]);
  const d=simState.day; const c=SIM_CROPS[simState.crop]; const col=c.color;
  const n = d<=3?1 : d<=10?2 : d<=17?3 : d<=25?4 : 5;   // 성장 단계 → 개체 수/크기
  const h = 0.3 + (d/30)*1.6;
  for(let i=0;i<n;i++){
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,h,6), new THREE.MeshLambertMaterial({color:0x4f8a3a}));
    const x=(i-(n-1)/2)*0.9; stem.position.set(x,h/2,0); g.add(stem);
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.15+d/70,8,8), new THREE.MeshLambertMaterial({color:col}));
    leaf.position.set(x,h,0); leaf.scale.set(1,0.7,1); g.add(leaf);
    if(d>21){ const fruit=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), new THREE.MeshLambertMaterial({color:d>25?0xe0533a:0xd9c74a}));
      fruit.position.set(x+0.12,h-0.15,0.1); g.add(fruit); }
  }
}
function update3DGrowth(){ if(!three.ready) return; buildCrop(three.cropOutside); buildCrop(three.cropInside); }
function update3DCropColor(){ update3DGrowth(); }
